<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Donor Registration - Blood Buddy</title>
    <link rel="stylesheet" href="theme.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(255, 71, 87, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(20, 184, 166, 0.05) 0%, transparent 40%);
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem 2.5rem;
            text-align: center;
            position: relative;
        }

        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .home-link:hover {
            color: var(--primary);
        }

        .auth-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-group input,
        .input-group select {
            padding-left: 3rem;
            /* Make room for icon */
        }

        /* Custom Select Styling */
        select.input-base {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            color: var(--text-main);
        }

        select.input-base:invalid,
        select.input-base option[value=""] {
            color: var(--text-muted);
        }

        .submit-btn {
            width: 100%;
            margin-top: 1rem;
        }

        .links-area {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            font-size: 0.95rem;
        }

        .links-area a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .links-area a:hover {
            color: var(--text-main);
        }
    </style>
</head>

<body>

    <div class="glass-panel auth-card">
        <a href="index.html" class="home-link"><i class="fas fa-arrow-left"></i> Home</a>

        <div style="margin-bottom: 1.5rem;">
            <i class="fas fa-heartbeat" style="font-size: 2.5rem; color: var(--primary);"></i>
        </div>
        <h2>Start Saving Lives</h2>
        <p class="subtitle">Join the Blood Buddy Donor Network</p>

        <form id="donorForm">

            <div class="input-group">
                <i class="fas fa-user icon"></i>
                <input id="name" type="text" class="input-base" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <i class="fas fa-tint"></i>
                <select id="blood" class="input-base" required>
                    <option value="" disabled selected hidden>Select Blood Group</option>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>O+</option>
                    <option>O-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                </select>
            </div>

            <div class="input-group">
                <i class="fas fa-map-marker-alt"></i>
                <input id="city" type="text" class="input-base" placeholder="City" required>
            </div>

            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input id="phone" type="tel" class="input-base" placeholder="Phone Number" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input id="password" type="password" class="input-base" placeholder="Create Password" required>
            </div>

            <button type="submit" class="btn btn-primary submit-btn">Register as Donor</button>
        </form>

        <div class="links-area">
            <a href="index.html">Skip for now</a>
        </div>
    </div>

    <script src="./Register.js"></script>
</body>

</html>
